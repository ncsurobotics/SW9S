# Environment Vars:
# SW9_DOCKER_WORKING_DIR   Path to this directory
# DEPTHAI_TAG              docker image tag for depthai image (arm or x86)
# YOLO_DOCKERFILE          Dockerfile to build yolo_ros (arm or x86)
# SW9_ARCH                 Arch label


services:
  depthai_node:
    image: "luxonis/depthai-ros:${DEPTHAI_TAG:-kilted-latest}"
    network_mode: "host"
    privileged: true
    runtime: nvidia
    restart: unless-stopped
    environment:
      - ROS_DOMAIN_ID=0
      # - FASTDDS_DEFAULT_PROFILES_FILE=/root/ROS/fastdds_no_shm.xml
      - RMW_IMPLEMENTATION=rmw_cyclonedds_cpp
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=all
      - SW9_ARCH=${SW9_ARCH}
    healthcheck:
      test:
        - "CMD-SHELL"
        - |
          /bin/bash -c "export FASTDDS_DEFAULT_PROFILES_FILE=/root/ROS/fastdds_no_shm.xml && \
          export RMW_IMPLEMENTATION=rmw_fastrtps_cpp && \
          source /opt/ros/kilted/setup.bash && \
          ros2 topic echo --once /camera/camera/color/camera_info"
      interval: 5s
      timeout: 5s
      retries: 2
      start_period: 15s
    deploy:
      restart_policy:
        condition: on-failure
        delay: 2s
        max_attempts: 10
        window: 120s
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    entrypoint: ["/bin/bash", "-c", "/root/ROS/depthai-entrypoint.sh"]
    working_dir: /root/ROS
    user: root
    volumes:
      - ${SW9_DOCKER_WORKING_DIR}:/root/ROS
      - /dev:/dev

  yolo_ros:
    image: "ghcr.io/ncsurobotics/yolo_ros:${SW9_ARCH}"
    network_mode: "host"
    privileged: true
    runtime: nvidia
    restart: unless-stopped
    environment:
      - ROS_DOMAIN_ID=0
      # - FASTDDS_DEFAULT_PROFILES_FILE=/root/ROS/fastdds_no_shm.xml
      - RMW_IMPLEMENTATION=rmw_cyclonedds_cpp
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=all
      - PYTHONPATH=/opt/venv/lib/python3.10/site-packages
      - LD_LIBRARY_PATH=/usr/local/cuda-12.6/targets/aarch64-linux/lib:/usr/lib/aarch64-linux-gnu/tegra
    depends_on:
      depthai_node:
        condition: service_started
    healthcheck:
      test:
        - "CMD-SHELL"
        - |
          /bin/bash -c "export FASTDDS_DEFAULT_PROFILES_FILE=/root/ROS/fastdds_no_shm.xml && \
          export RMW_IMPLEMENTATION=rmw_fastrtps_cpp && \
          (source /opt/ros/jazzy/setup.bash 2>/dev/null || source /opt/ros/kilted/setup.bash || source /opt/ros/humble/setup.bash || source /opt/ros/humble/install/setup.bash) && \
          ros2 topic echo --once /yolo/dbg_image"
      interval: 5s
      timeout: 5s
      retries: 2
      start_period: 60s
    deploy:
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 0
        window: 120s
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    entrypoint: ["/bin/bash", "-c", "/root/ROS/yolo-entrypoint.sh"]
    working_dir: /root/ROS
    user: root
    volumes:
      - ${SW9_DOCKER_WORKING_DIR}:/root/ROS
      - /dev:/dev
      - /usr/bin/tegrastats:/usr/bin/tegrastats
      - /tmp/argus_socket:/tmp/argus_socket
      - /usr/local/cuda-12.6/targets/aarch64-linux/lib/libcusolver.so.11:/usr/local/cuda-12.6/targets/aarch64-linux/lib/libcusolver.so.11
      - /usr/local/cuda-12.6/targets/aarch64-linux/lib/libcusparse.so.11:/usr/local/cuda-12.6/targets/aarch64-linux/lib/libcusparse.so.11
      - /usr/local/cuda-12.6/targets/aarch64-linux/lib/libcurand.so.10:/usr/local/cuda-12.6/targets/aarch64-linux/lib/libcurand.so.10
      - /usr/local/cuda-12.6/targets/aarch64-linux/lib/libnvToolsExt.so:/usr/local/cuda-12.6/targets/aarch64-linux/lib/libnvToolsExt.so
      - /usr/local/cuda-12.6/targets/aarch64-linux/lib/libcupti.so.11.4:/usr/local/cuda-12.6/targets/aarch64-linux/lib/libcupti.so.11.4
      - /usr/local/cuda-12.6/targets/aarch64-linux/include:/usr/local/cuda-12.6/targets/aarch64-linux/include
      - /usr/local/cuda-12.6:/usr/local/cuda-12.6
      - /usr/lib/aarch64-linux-gnu/libcudss/12:/usr/lib/aarch64-linux-gnu/libcudss/12
      - /usr/lib/aarch64-linux-gnu/tegra:/usr/lib/aarch64-linux-gnu/tegra
      - /usr/src/jetson_multimedia_api:/usr/src/jetson_multimedia_api
      - /opt/nvidia/nsight-systems-cli:/opt/nvidia/nsight-systems-cli
      - /opt/nvidia/vpi2:/opt/nvidia/vpi2
      - /usr/share/vpi2:/usr/share/vpi2
